llm:
  provider: ollama
  model: llama3.2:3b
  baseUrl: http://localhost:11434/v1
database:
  path: ./db/knowledge.db
embedding:
  provider: "local"
  model: "nomic-embed-text"
  batchSize: 50
  useCache: true
  maxTokens: 1024
search:
  semanticPolicy: degrade
  hybridPolicy: degrade
  maxSearchWindow: 2000
  enforceVectorSqlParity: true
