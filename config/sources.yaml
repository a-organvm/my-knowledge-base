# ==============================================================================
# 🌐 Unified Knowledge Sources Configuration
# ==============================================================================
# This file defines the "Watch Roots" for the Federated Knowledge System.
# The system indexes files "in-place" without copying them.

sources:
  # ----------------------------------------------------------------------------
  # 📦 Local Projects (Physically at ~/Projects)
  # ----------------------------------------------------------------------------
  - id: "local-projects"
    name: "Local Projects"
    provider: "local"
    path: "~/Projects"
    enabled: true
    patterns:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.pdf"
      - "**/*.json"
    ignore:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/.git/**"
      - "**/vendor/**"
      - "**/target/**"
      - "**/build/**"

  # ----------------------------------------------------------------------------
  # 💻 Workspace Projects (~/Workspace)
  # ----------------------------------------------------------------------------
  - id: "workspace-projects"
    name: "Workspace Projects"
    provider: "local"
    path: "~/Workspace"
    enabled: false
    patterns:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.pdf"
    ignore:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/.git/**"
      - "**/vendor/**"
      - "**/target/**"
      - "**/build/**"
      - "**/Library/**"

  # ----------------------------------------------------------------------------
  # 📥 Intake (Brain Sweep staging)
  # ----------------------------------------------------------------------------
  - id: "intake-documents"
    name: "Intake Documents"
    provider: "local"
    path: "intake"
    enabled: true
    patterns:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.pdf"
      - "**/*.json"
    ignore:
      - "**/artifacts/**"
      - "**/canonical/**"
      - "**/reports/**"
      - "**/archive-batches/**"

  # ----------------------------------------------------------------------------
  # 🖥️ Desktop & Downloads
  # ----------------------------------------------------------------------------
  - id: "desktop-items"
    name: "Desktop"
    provider: "local"
    path: "~/Desktop"
    enabled: true
    patterns:
      - "*.md"
      - "*.pdf"
      - "*.txt"

  - id: "downloads-items"
    name: "Downloads"
    provider: "local"
    path: "~/Downloads"
    enabled: true
    patterns:
      - "*.md"
      - "*.pdf"
      - "*.txt"

  # ----------------------------------------------------------------------------
  # ⚖️ MDC Legal Case
  # ----------------------------------------------------------------------------
  - id: "mdc-legal"
    name: "MDC Legal Case"
    provider: "local"
    path: "/Users/4jp/Legal/padavano-v-mdc--employment-lawsuit"
    enabled: true
    patterns:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.pdf"

  # ----------------------------------------------------------------------------
  # ☁️ iCloud Drive
  # ----------------------------------------------------------------------------
  - id: "icloud-docs"
    name: "iCloud Documents"
    provider: "icloud"
    path: "~/Library/Mobile Documents/com~apple~CloudDocs/Documents"
    enabled: false  # Disable for now to speed up ingestion
    patterns:
      - "**/*.md"
      - "**/*.pdf"

settings:
  integrity_check: true   # Compute hashes to detect changes
  watch_mode: true        # Use file system watchers for real-time updates
